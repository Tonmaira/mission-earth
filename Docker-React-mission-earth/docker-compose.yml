version: '3.9'

services:
  app:
    environment:
      - TZ=Asia/Bangkok
      - DB_HOST=mssql
      - DB_PORT=1433
      - DB_USER=sa
      - DB_PASSWORD=897H4nkxWmp39mIAcBtv8w24
      - DB_NAME=ME_DB
    build: .
    container_name: me_app
    volumes:
      - ./project/backend:/app
      - ./project/backend/node_modules:/app/node_modules
      - ./project/frontend:/app/frontend
      - ./project/frontend/node_modules:/app/frontend/node_modules
      - ./nginx/http.d/:/etc/nginx/http.d/
    ports:
      - '8145:80'
    depends_on:
      - mssql
    restart: always

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: me_database
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=897H4nkxWmp39mIAcBtv8w24
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    restart: always

volumes:
  mssql_data: